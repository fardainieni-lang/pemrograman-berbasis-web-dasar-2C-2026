<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white flex justify-center items-center min-h-screen">

  <form id="contactForm" novalidate class="bg-gray-100 p-6 rounded-lg w-80">
    <h2 class="text-xl font-bold text-center mb-3">Contact</h2>

    <input type="text" id="name" placeholder="Nama" class="w-full p-2 border rounded mb-3">
    <p id="nameError" class="text-red-500 text-xs"></p>

    <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
    <p id="emailError" class="text-red-500 text-xs"></p>

    <textarea id="message" placeholder="Pesan" class="w-full p-2 border rounded mb-3"></textarea>
    <p id="messageError" class="text-red-500 text-xs"></p>

    <button type="submit"
      class="w-full bg-orange-400 text-white p-2 rounded">
      Kirim
    </button>
  </form>

  <script>
    const form = document.getElementById("contactForm");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      let valid = true;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      document.getElementById("nameError").innerText = "";
      document.getElementById("emailError").innerText = "";
      document.getElementById("messageError").innerText = "";

      if (name === "") {
        document.getElementById("nameError").innerText = "Nama wajib diisi";
        valid = false;
      }

      if (email === "") {
        document.getElementById("emailError").innerText = "Email wajib diisi";
        valid = false;
      } else if (!email.includes("@gmail.com")) {
        document.getElementById("emailError").innerText = "Email tidak valid";
        valid = false;
      }

      if (message === "") {
        document.getElementById("messageError").innerText = "Pesan wajib diisi";
        valid = false;
      }

      if (valid) {
        alert("Berhasil dikirim!");
        form.reset();
      }
    });
  </script>

</body>
</html>
